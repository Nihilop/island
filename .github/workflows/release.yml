# Build + publication d'une release à CHAQUE push d'un tag `v*` (ex. `git tag v0.5.0 && git push --tags`).
# tauri-action compile l'app, signe les artefacts (updater) et crée la release GitHub
# avec les installeurs + `latest.json` (consommé par l'auto-updater).
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write # créer la release + uploader les assets
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4   # lit la version dans package.json (champ "packageManager")

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Clés de signature de l'updater (à ajouter dans les secrets du dépôt) :
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Island ${{ github.ref_name }}"
          releaseBody: |
            ## Island ${{ github.ref_name }}

            A Dynamic Island for Windows — a floating, shape-shifting bar at the top of
            your screen that hosts your tools (media, screen capture, launcher, system
            monitor, …) as installable extensions.

            ### Install
            Download **`Island_*_x64-setup.exe`** (recommended) or the `.msi` below, and run it.

            ### Auto-update
            Installed versions update themselves automatically on the next launch.
          releaseDraft: false # publie directement (plus de draft caché)
          prerelease: false
          includeUpdaterJson: true # génère latest.json (signé) pour l'auto-updater
